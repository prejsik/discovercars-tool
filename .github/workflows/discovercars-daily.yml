name: DiscoverCars daily run

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/discovercars-daily.yml"
      - "src/**"
      - "package.json"
      - "package-lock.json"
  # GitHub cron uses UTC. These two entries plus the Warsaw-hour gate below
  # keep the real run at 17:00 Europe/Warsaw during both summer and winter time.
  schedule:
    - cron: "0 15 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      locations:
        description: "Comma-separated locations for the test run"
        required: true
        default: "Warsaw"
      rolling_days:
        description: "How many pickup start dates from tomorrow"
        required: true
        default: "2"
      durations:
        description: "Comma-separated rental durations"
        required: true
        default: "2"
      speed_mode:
        description: "Scraper speed mode: safe, fast, or turbo"
        required: true
        default: "fast"

permissions:
  contents: read
  pages: write
  id-token: write

env:
  # Scheduled run defaults: all local-tool cities, tomorrow only, rental durations 2..10.
  SCHEDULE_LOCATIONS: "Warsaw,Krakow,Gdansk,Katowice,Wroclaw,Poznan"
  SCHEDULE_ROLLING_DAYS: "1"
  SCHEDULE_DURATIONS: "2,3,4,5,6,7,8,9,10"
  SCHEDULE_SPEED_MODE: "fast"
  # Push-triggered smoke test defaults: keep validation quick after code/workflow changes.
  PUSH_TEST_LOCATIONS: "Warsaw,Krakow,Gdansk,Katowice,Wroclaw,Poznan"
  PUSH_TEST_ROLLING_DAYS: "2"
  PUSH_TEST_DURATIONS: "2"
  PUSH_TEST_SPEED_MODE: "fast"

jobs:
  discovercars:
    name: Run DiscoverCars scraper
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment:
      name: github-pages
      url: ${{ steps.pages-deployment.outputs.page_url }}

    steps:
      - name: Check Warsaw schedule gate
        id: gate
        shell: bash
        run: |
          warsaw_hour="$(TZ=Europe/Warsaw date +%H)"
          warsaw_now="$(TZ=Europe/Warsaw date '+%Y-%m-%d %H:%M:%S %Z')"

          echo "warsaw_now=$warsaw_now" >> "$GITHUB_OUTPUT"
          echo "Warsaw time now: $warsaw_now"

          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "Non-scheduled run requested, bypassing schedule gate."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$warsaw_hour" == "17" ]]; then
            echo "It is 17:00 in Warsaw, running scraper."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "It is not 17:00 in Warsaw, skipping this UTC trigger."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node dependencies
        if: steps.gate.outputs.should_run == 'true'
        run: npm ci

      - name: Install Playwright Chromium
        if: steps.gate.outputs.should_run == 'true'
        run: npx playwright install --with-deps chromium

      - name: Resolve run options
        if: steps.gate.outputs.should_run == 'true'
        id: options
        shell: bash
        env:
          INPUT_LOCATIONS: ${{ inputs.locations }}
          INPUT_ROLLING_DAYS: ${{ inputs.rolling_days }}
          INPUT_DURATIONS: ${{ inputs.durations }}
          INPUT_SPEED_MODE: ${{ inputs.speed_mode }}
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            default_locations="$PUSH_TEST_LOCATIONS"
            default_rolling_days="$PUSH_TEST_ROLLING_DAYS"
            default_durations="$PUSH_TEST_DURATIONS"
            default_speed_mode="$PUSH_TEST_SPEED_MODE"
          else
            default_locations="$SCHEDULE_LOCATIONS"
            default_rolling_days="$SCHEDULE_ROLLING_DAYS"
            default_durations="$SCHEDULE_DURATIONS"
            default_speed_mode="$SCHEDULE_SPEED_MODE"
          fi

          locations="${INPUT_LOCATIONS:-$default_locations}"
          rolling_days="${INPUT_ROLLING_DAYS:-$default_rolling_days}"
          durations="${INPUT_DURATIONS:-$default_durations}"
          speed_mode="${INPUT_SPEED_MODE:-$default_speed_mode}"

          echo "locations=$locations" >> "$GITHUB_OUTPUT"
          echo "rolling_days=$rolling_days" >> "$GITHUB_OUTPUT"
          echo "durations=$durations" >> "$GITHUB_OUTPUT"
          echo "speed_mode=$speed_mode" >> "$GITHUB_OUTPUT"

          echo "Locations: $locations"
          echo "Rolling days: $rolling_days"
          echo "Durations: $durations"
          echo "Speed mode: $speed_mode"

      - name: Run scraper
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        run: |
          mkdir -p output
          set -o pipefail

          node src/index.js \
            --save=output/results-latest.json \
            --locations="${{ steps.options.outputs.locations }}" \
            --scenario-mode=rolling \
            --rolling-days="${{ steps.options.outputs.rolling_days }}" \
            --durations="${{ steps.options.outputs.durations }}" \
            --strategy=legacy-batch \
            --speed-mode="${{ steps.options.outputs.speed_mode }}" \
            --scenario-concurrency=auto \
            --location-concurrency=auto \
            --timeout=auto \
            --retries=1 \
            --reset-state \
            | tee output/run-log.txt

      - name: Generate HTML report
        if: steps.gate.outputs.should_run == 'true' && always()
        run: node src/reportHtml.js output/results-latest.json output/report.html

      - name: Check GitHub Pages status
        id: pages-status
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          pages_api_url="${GITHUB_API_URL:-https://api.github.com}/repos/${GITHUB_REPOSITORY}/pages"
          status=$(
            curl --silent --show-error \
              --output /tmp/pages.json \
              --write-out "%{http_code}" \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GITHUB_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "$pages_api_url"
          )

          if [[ "$status" == "200" ]]; then
            page_url=$(node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync('/tmp/pages.json', 'utf8')); process.stdout.write(data.html_url || '');")
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "page_url=$page_url" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is enabled: $page_url"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "page_url=" >> "$GITHUB_OUTPUT"
            echo "::warning::GitHub Pages is not enabled or is not supported by the current repository plan; Pages deploy skipped."
          fi

      - name: Prepare GitHub Pages site
        if: steps.gate.outputs.should_run == 'true' && steps.pages-status.outputs.enabled == 'true'
        run: |
          mkdir -p pages
          cp output/report.html pages/index.html
          cp output/report.html pages/report.html
          cp output/results-latest.json pages/results-latest.json
          cp output/run-log.txt pages/run-log.txt

      - name: Configure GitHub Pages
        if: steps.gate.outputs.should_run == 'true' && steps.pages-status.outputs.enabled == 'true'
        uses: actions/configure-pages@v5
        continue-on-error: true

      - name: Upload GitHub Pages artifact
        if: steps.gate.outputs.should_run == 'true' && steps.pages-status.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v3
        continue-on-error: true
        with:
          path: pages

      - name: Deploy GitHub Pages
        id: pages-deployment
        if: steps.gate.outputs.should_run == 'true' && steps.pages-status.outputs.enabled == 'true'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Upload scraper results
        id: upload
        if: steps.gate.outputs.should_run == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: discovercars-results-${{ github.run_number }}
          path: |
            output/results-latest.json
            output/report.html
            output/run-log.txt
            output/state.json
          if-no-files-found: warn
          retention-days: 14

      - name: Notify Telegram
        if: steps.gate.outputs.should_run == 'true' && steps.upload.outputs['artifact-url'] != ''
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PAGE_URL: ${{ steps.pages-deployment.outputs.page_url || steps.pages-status.outputs.page_url }}
          ARTIFACT_URL: ${{ steps.upload.outputs['artifact-url'] }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [[ -z "$TELEGRAM_BOT_TOKEN" || -z "$TELEGRAM_CHAT_ID" ]]; then
            echo "::warning::Telegram secrets are missing; notification skipped."
            exit 0
          fi

          if [[ -n "$PAGE_URL" ]]; then
            message=$(printf 'DiscoverCars: wyniki sa gotowe.\n\nRaport:\n%s\n\nArtifact backup:\n%s\n\nGitHub Actions run:\n%s\n' "$PAGE_URL" "$ARTIFACT_URL" "$RUN_URL")
          else
            message=$(printf 'DiscoverCars: wyniki sa gotowe.\n\nArtifact:\n%s\n\nGitHub Actions run:\n%s\n' "$ARTIFACT_URL" "$RUN_URL")
          fi

          if ! curl --fail --show-error --silent \
            --request POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${message}" \
            --data-urlencode "disable_web_page_preview=true"; then
            echo "::warning::Telegram notification failed; scraper results were still uploaded."
          fi
