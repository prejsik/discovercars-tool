name: DiscoverCars daily run

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/discovercars-daily.yml"
      - "src/**"
      - "package.json"
      - "package-lock.json"
  # GitHub cron uses UTC. These two entries plus the Warsaw-hour gate below
  # keep the real run at 17:00 Europe/Warsaw during both summer and winter time.
  schedule:
    - cron: "0 15 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      locations:
        description: "Comma-separated locations for the test run"
        required: true
        default: "Warsaw"
      rolling_days:
        description: "How many pickup start dates from tomorrow"
        required: true
        default: "1"
      durations:
        description: "Comma-separated rental durations"
        required: true
        default: "2"
      speed_mode:
        description: "Scraper speed mode: safe, fast, or turbo"
        required: true
        default: "fast"

permissions:
  contents: read

env:
  # Scheduled run defaults: all local-tool cities, tomorrow only, rental durations 2..10.
  SCHEDULE_LOCATIONS: "Warsaw,Krakow,Gdansk,Katowice,Wroclaw,Poznan"
  SCHEDULE_ROLLING_DAYS: "1"
  SCHEDULE_DURATIONS: "2,3,4,5,6,7,8,9,10"
  SCHEDULE_SPEED_MODE: "fast"

jobs:
  discovercars:
    name: Run DiscoverCars scraper
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check Warsaw schedule gate
        id: gate
        shell: bash
        run: |
          warsaw_hour="$(TZ=Europe/Warsaw date +%H)"
          warsaw_now="$(TZ=Europe/Warsaw date '+%Y-%m-%d %H:%M:%S %Z')"

          echo "warsaw_now=$warsaw_now" >> "$GITHUB_OUTPUT"
          echo "Warsaw time now: $warsaw_now"

          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "Non-scheduled run requested, bypassing schedule gate."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$warsaw_hour" == "17" ]]; then
            echo "It is 17:00 in Warsaw, running scraper."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "It is not 17:00 in Warsaw, skipping this UTC trigger."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node dependencies
        if: steps.gate.outputs.should_run == 'true'
        run: npm ci

      - name: Install Playwright Chromium
        if: steps.gate.outputs.should_run == 'true'
        run: npx playwright install --with-deps chromium

      - name: Resolve run options
        if: steps.gate.outputs.should_run == 'true'
        id: options
        shell: bash
        env:
          INPUT_LOCATIONS: ${{ inputs.locations }}
          INPUT_ROLLING_DAYS: ${{ inputs.rolling_days }}
          INPUT_DURATIONS: ${{ inputs.durations }}
          INPUT_SPEED_MODE: ${{ inputs.speed_mode }}
        run: |
          locations="${INPUT_LOCATIONS:-$SCHEDULE_LOCATIONS}"
          rolling_days="${INPUT_ROLLING_DAYS:-$SCHEDULE_ROLLING_DAYS}"
          durations="${INPUT_DURATIONS:-$SCHEDULE_DURATIONS}"
          speed_mode="${INPUT_SPEED_MODE:-$SCHEDULE_SPEED_MODE}"

          echo "locations=$locations" >> "$GITHUB_OUTPUT"
          echo "rolling_days=$rolling_days" >> "$GITHUB_OUTPUT"
          echo "durations=$durations" >> "$GITHUB_OUTPUT"
          echo "speed_mode=$speed_mode" >> "$GITHUB_OUTPUT"

          echo "Locations: $locations"
          echo "Rolling days: $rolling_days"
          echo "Durations: $durations"
          echo "Speed mode: $speed_mode"

      - name: Run scraper
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        run: |
          mkdir -p output
          set -o pipefail

          node src/index.js \
            --save=output/results-latest.json \
            --locations="${{ steps.options.outputs.locations }}" \
            --scenario-mode=rolling \
            --rolling-days="${{ steps.options.outputs.rolling_days }}" \
            --durations="${{ steps.options.outputs.durations }}" \
            --strategy=legacy-batch \
            --speed-mode="${{ steps.options.outputs.speed_mode }}" \
            --scenario-concurrency=auto \
            --location-concurrency=auto \
            --timeout=auto \
            --retries=1 \
            --reset-state \
            | tee output/run-log.txt

      - name: Generate HTML report
        if: steps.gate.outputs.should_run == 'true' && always()
        run: node src/reportHtml.js output/results-latest.json output/report.html

      - name: Upload scraper results
        if: steps.gate.outputs.should_run == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: discovercars-results-${{ github.run_number }}
          path: |
            output/results-latest.json
            output/report.html
            output/run-log.txt
            output/state.json
          if-no-files-found: warn
          retention-days: 14
